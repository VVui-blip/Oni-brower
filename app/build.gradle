apply plugin: 'com.android.application'

android {
    namespace 'com.oni.browser'
    compileSdk 33

    defaultConfig {
        applicationId "com.oni.browser"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
